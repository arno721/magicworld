<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="在瀏覽器中體驗 Minecraft 風格的 3D 開放世界！使用 Three.js 打造，包含程序化生成地形、方塊破壞與放置、物理碰撞等玩法。">
    <meta name="keywords" content="Minecraft, Web, 3D, Three.js, 遊戲, 方塊, 開放世界, 瀏覽器遊戲">
    <meta name="author" content="arno721">
    <meta property="og:title" content="Minecraft Web 3D - 瀏覽器中的方塊世界">
    <meta property="og:description" content="在瀏覽器中體驗 Minecraft 風格的 3D 開放世界！使用 Three.js 打造，包含程序化生成地形、方塊破壞與放置、物理碰撞等玩法。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://arno721.github.io/magicworld/">
    <meta property="og:image" content="https://raw.githubusercontent.com/arno721/magicworld/main/index.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Minecraft Web 3D - 瀏覽器中的方塊世界">
    <meta name="twitter:description" content="在瀏覽器中體驗 Minecraft 風格的 3D 開放世界！使用 Three.js 打造。">
    <title>Minecraft Web 3D - 瀏覽器方塊世界</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --ui-bg: rgba(0, 0, 0, 0.75);
            --text: #e0e0e0;
            --accent: #fff;
            --slot-bg: #3a3a3a;
            --slot-selected: #ffffff;
            --slot-border: #555;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', 'Noto Sans TC', system-ui, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            width: 100vw; height: 100vh; height: 100dvh;
        }
        #canvas-container { position: fixed; inset: 0; z-index: 1; }
        canvas { display: block; }

        #crosshair {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; pointer-events: none; display: flex; align-items: center; justify-content: center;
        }
        #crosshair .line { position: absolute; background: rgba(255,255,255,0.85); border-radius: 1px; box-shadow: 0 0 3px rgba(0,0,0,0.6); }
        #crosshair .h { width: 20px; height: 2px; }
        #crosshair .v { width: 2px; height: 20px; }
        #crosshair .dot { width: 3px; height: 3px; background: rgba(255,255,255,0.7); border-radius: 50%; position: absolute; }

        #hint {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, calc(-50% + 60px));
            z-index: 10; pointer-events: none; color: #fff; font-size: 15px; text-align: center;
            text-shadow: 0 0 8px rgba(0,0,0,0.8); transition: opacity 0.4s; letter-spacing: 0.5px;
        }

        #hotbar {
            position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); z-index: 20;
            display: flex; gap: 3px; background: var(--ui-bg); border-radius: 8px; padding: 6px 8px;
            border: 1.5px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px);
        }
        .slot {
            width: 46px; height: 46px; border-radius: 4px; background: var(--slot-bg);
            border: 2px solid var(--slot-border); cursor: pointer; position: relative;
            transition: border-color 0.15s, transform 0.12s; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .slot:hover { border-color: #aaa; transform: translateY(-2px); }
        .slot.selected { border-color: #fff; box-shadow: 0 0 14px rgba(255,255,255,0.5); transform: translateY(-3px); background: #4a4a4a; }
        .slot .block-preview { width: 28px; height: 28px; border-radius: 2px; image-rendering: pixelated; }
        .slot .slot-number { position: absolute; top: 3px; left: 6px; font-size: 10px; color: #bbb; font-weight: 700; text-shadow: 0 1px 2px rgba(0,0,0,0.7); }

        #loading {
            position: fixed; inset: 0; z-index: 100; background: #1a1a1a; display: flex;
            flex-direction: column; align-items: center; justify-content: center; color: #fff;
            font-size: 18px; transition: opacity 0.5s; pointer-events: all;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        #loading .loader-bar-bg { width: 200px; height: 6px; background: #333; border-radius: 3px; margin-top: 16px; overflow: hidden; }
        #loading .loader-bar-fill { height: 100%; background: #7ec850; border-radius: 3px; transition: width 0.2s; width: 0%; }

        #block-indicator {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9;
            pointer-events: none; font-size: 13px; color: #fff; text-shadow: 0 0 6px rgba(0,0,0,0.8);
            opacity: 0; transition: opacity 0.2s; text-align: center;
        }

        /* HUD */
        #hud { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 15; pointer-events: none; display: flex; gap: 20px; align-items: center; }
        #hud .stat-bar { display: flex; gap: 2px; }
        #hud .stat-bar .icon { font-size: 18px; text-shadow: 0 0 4px rgba(0,0,0,0.8); }
        #hud .stat-bar .icon.lost { opacity: 0.25; }

        #mana-bar { position: fixed; bottom: 75px; right: 20px; z-index: 15; pointer-events: none; }
        #mana-bar .bar-bg { width: 120px; height: 10px; background: rgba(0,0,0,0.6); border-radius: 5px; overflow: hidden; }
        #mana-bar .bar-fill { height: 100%; background: linear-gradient(90deg, #4488ff, #66bbff); border-radius: 5px; transition: width 0.2s; }
        #mana-bar .label { color: #8cf; font-size: 11px; text-shadow: 0 0 4px rgba(0,0,0,0.9); text-align: right; margin-bottom: 2px; }

        #spell-hud {
            position: fixed; bottom: 55px; left: 50%; transform: translateX(-50%); z-index: 15;
            pointer-events: none; color: #c8aaff; font-size: 14px; text-shadow: 0 0 8px rgba(0,0,0,0.9);
            background: rgba(0,0,0,0.5); padding: 4px 14px; border-radius: 12px;
            border: 1px solid rgba(200,170,255,0.3); display: none;
        }

        #death-screen {
            position: fixed; inset: 0; z-index: 200; background: rgba(150,0,0,0.7);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            color: #fff; font-size: 36px;
        }
        #death-screen button {
            margin-top: 20px; padding: 10px 30px; font-size: 18px; cursor: pointer;
            background: #333; color: #fff; border: 2px solid #666; border-radius: 8px;
        }
        #death-screen button:hover { background: #555; }

        /* 合成畫面 */
        #crafting-screen {
            position: fixed; inset: 0; z-index: 55; background: rgba(25,25,35,0.93);
            display: none; flex-direction: column; align-items: center; justify-content: center; color: #fff;
        }
        #crafting-screen .craft-title { font-size: 22px; margin-bottom: 16px; }
        #crafting-screen .craft-area { display: flex; align-items: center; gap: 20px; }
        #crafting-screen .craft-grid { display: grid; gap: 2px; background: rgba(0,0,0,0.3); padding: 6px; border-radius: 6px; }
        #crafting-screen .craft-grid.craft-3x3 { grid-template-columns: repeat(3, 42px); }
        #crafting-screen .craft-grid.craft-2x2 { grid-template-columns: repeat(2, 42px); }
        #crafting-screen .craft-slot {
            width: 42px; height: 42px; background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 3px;
            display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer;
        }
        #crafting-screen .craft-slot .count {
            position: absolute; bottom: 1px; right: 3px; font-size: 9px; color: #aaa;
        }
        #crafting-screen .craft-slot .block-preview { width: 24px; height: 24px; image-rendering: pixelated; }
        #crafting-screen .craft-arrow { font-size: 28px; color: #888; padding: 0 10px; }
        #crafting-screen .craft-result {
            width: 42px; height: 42px; background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.2); border-radius: 3px;
            display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer;
        }
        #crafting-screen .craft-result .block-preview { width: 28px; height: 28px; image-rendering: pixelated; }
        #crafting-screen .craft-result .count {
            position: absolute; bottom: 1px; right: 3px; font-size: 9px; color: #ffd;
        }
        #crafting-screen .craft-close {
            margin-top: 20px; padding: 8px 30px; font-size: 14px; cursor: pointer;
            background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
        }
        #crafting-screen .craft-close:hover { background: rgba(255,255,255,0.2); }
        #crafting-screen .craft-badge {
            position: absolute; top: -8px; right: -8px; font-size: 9px;
            background: #5a4; padding: 1px 5px; border-radius: 8px;
        }

        /* 背包畫面 */
        #inventory-screen {
            position: fixed; inset: 0; z-index: 50; background: rgba(30,30,40,0.92);
            display: none; flex-direction: column; align-items: center; justify-content: center; color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        #inventory-screen .inv-title { font-size: 24px; margin-bottom: 20px; }
        #inventory-screen .inv-grid {
            display: grid; grid-template-columns: repeat(9, 48px); gap: 2px;
            background: rgba(0,0,0,0.4); padding: 8px; border-radius: 8px;
        }
        #inventory-screen .inv-slot {
            width: 48px; height: 48px; background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 3px;
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        #inventory-screen .inv-slot .count {
            position: absolute; bottom: 2px; right: 4px; font-size: 10px; color: #ccc;
        }
        #inventory-screen .inv-slot .block-preview { width: 28px; height: 28px; image-rendering: pixelated; }

        /* ESC 選單 */
        #esc-menu {
            position: fixed; inset: 0; z-index: 60; background: rgba(0,0,0,0.6);
            display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
            backdrop-filter: blur(4px);
        }
        #esc-menu .menu-title { color: #fff; font-size: 28px; margin-bottom: 20px; }
        #esc-menu button {
            width: 200px; padding: 12px 24px; font-size: 16px; cursor: pointer;
            background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px; transition: background 0.2s;
        }
        #esc-menu button:hover { background: rgba(255,255,255,0.2); }
        #esc-menu button.quit { border-color: #c44; color: #f88; }


    </style>
</head>
<body>

<div id="canvas-container"></div>
<div id="crosshair">
    <div class="line h"></div>
    <div class="line v"></div>
    <div class="dot"></div>
</div>
<div id="hint">點擊畫面開始遊戲<br><small>WASD移動 · 空白跳躍 · Shift衝刺 · 左鍵破壞 · 右鍵放置 · 1-9選方塊 · M魔法模式 · C選法術 · F施法</small></div>
<div id="block-indicator"></div>
<div id="hud">
    <div class="stat-bar" id="health-bar"></div>
    <div class="stat-bar" id="food-bar"></div>
</div>
<div id="mana-bar">
    <div class="label">魔力 <span id="mana-text">100/100</span></div>
    <div class="bar-bg"><div class="bar-fill" id="mana-fill" style="width:100%"></div></div>
</div>
<div id="spell-hud"></div>
<div id="hotbar"></div>
<div id="inventory-screen">
    <div class="inv-title">🎒 背包</div>
    <div style="display:flex;gap:40px;align-items:flex-start;">
        <div class="inv-grid" id="inv-grid"></div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
            <div style="font-size:12px;color:#888;">簡易合成</div>
            <div class="craft-grid craft-2x2" id="inv-craft-grid"></div>
            <div class="craft-arrow" style="font-size:20px;">→</div>
            <div class="craft-result" id="inv-craft-result" style="width:42px;height:42px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.2);border-radius:3px;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;"></div>
            <div style="font-size:10px;color:#666;margin-top:4px;">右鍵工作台解鎖3x3</div>
        </div>
    </div>
    <div style="margin-top:12px;font-size:11px;color:#666;">按 E / ESC 關閉</div>
</div>
<div id="crafting-screen">
    <div class="craft-title">🪚 合成</div>
    <div class="craft-area">
        <div class="craft-grid craft-3x3" id="craft-grid"></div>
        <div class="craft-arrow">→</div>
        <div class="craft-result" id="craft-result"></div>
    </div>
    <button class="craft-close" id="craft-close-btn">關閉（E）</button>
</div>
<div id="esc-menu">
    <div class="menu-title">⚙ 設定</div>
    <button id="esc-resume">繼續遊戲</button>
    <button id="esc-save">儲存世界</button>
    <button id="esc-back" class="quit">回到標題畫面</button>
</div>
<div id="death-screen">
    <span>💀 你死了</span>
    <button id="respawn-btn">重生</button>
</div>
<div id="loading">
    <div>⛏ 正在生成世界...</div>
    <div class="loader-bar-bg"><div class="loader-bar-fill" id="load-bar"></div></div>
    <div style="font-size:12px;color:#999;margin-top:6px;" id="load-text">初始化...</div>
</div>

<!-- 使用 jsdelivr CDN（国内访问更稳定） -->
<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module" src="js/main.js"></script>
</body>
</html>
